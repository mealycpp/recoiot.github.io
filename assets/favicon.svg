<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1738"/>
      <stop offset="100%" stop-color="#050b1f"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d97a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <!-- Dark navy rounded square background -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  
  <!-- Outer hexagon (large, gold) -->
  <polygon points="32,8 53.4,20 53.4,44 32,56 10.6,44 10.6,20" 
           fill="none" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linejoin="round"/>
  
  <!-- Inner hexagon (smaller, teal) -->
  <polygon points="32,18 44.6,25.5 44.6,40.5 32,48 19.4,40.5 19.4,25.5" 
           fill="none" stroke="#6ee0c8" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Center dot (gold) -->
  <circle cx="32" cy="32.5" r="4.5" fill="#f5d97a"/>
</svg>
